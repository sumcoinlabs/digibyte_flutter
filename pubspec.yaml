name: digibyte
description: A new DigiByte wallet.

version: 0.1.3+13

environment:
  sdk: '>=3.2.0 <4.0.0'

publish_to: none

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  web_socket_channel: ^3.0.3
  crypto: ^3.0.3
  bip39: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.1
  provider: ^6.0.3
  share_plus: ^11.0.0
  qr_flutter: ^4.0.0
  intl: ^0.20.2
  step_progress_indicator: ^1.0.0
  qr_code_scanner: ^1.0.0
  url_launcher: ^6.1.4
  flutter_local_notifications: ^19.3.0
  flutter_screen_lock: ^9.0.3
  local_auth: ^2.1.6
  local_auth_android: any
  package_info_plus: ^8.3.0
  mailto: ^2.0.0
  flutter_slidable: ^4.0.0
  flutter_typeahead: ^5.2.0
  connectivity_plus: ^6.1.4
  theme_mode_handler: ^3.0.0
  http: ^1.4.0
  collection: ^1.18.0
  flutter_markdown: ^0.7.7+1
  background_fetch: ^1.3.7
  flutter_logs: ^2.1.11
  auto_size_text: ^3.0.0
  camera: ^0.11.1
  path_provider: ^2.0.11
  file_picker: ^10.2.0
  fast_csv: ^0.2.11
  protobuf: ^4.1.0
  grpc: ^4.1.0
  mockito: ^5.3.2
  loader_overlay: ^5.0.0
  app_bar_with_search_switch: ^1.5.4
  decimal: ^3.2.4
  characters: ^1.2.0
  digicoinlib_flutter: ^0.0.2

  firebase_core: ^3.14.0  # Updated to latest as of now
  firebase_analytics: ^11.5.0
  firebase_messaging: ^15.2.7
  firebase_in_app_messaging: ^0.8.1+7
  cloud_firestore: ^5.6.9
  firebase_crashlytics: ^4.3.7
  firebase_performance: ^0.10.1+7
  firebase_dynamic_links: ^6.1.7
  firebase_database: ^11.3.7
  google_mobile_ads: ^6.0.0
  #cryptography_flutter: ^2.3.2
  location: ^8.0.1
  visibility_detector: ^0.4.0+2
  #flutter_app_badger: ^1.5.0
  flutter_app_badge_control: ^0.0.2
  geocoding: ^4.0.0
  geolocator: ^14.0.1
  font_awesome_flutter: ^10.8.0
  google_fonts: ^6.2.1  # Updated to match latest

  in_app_review: ^2.0.9
  permission_handler: ^12.0.0+1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  test: any
  build_runner: ^2.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.2.7
  flutter_lints: ^6.0.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/dgb-icon.png"
  image_path_ios: "assets/icon/dgb-ios-app-xxl.png"
  remove_alpha_ios: true

flutter_launcher_name:
  name: "DigiByte"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/dgb-icon-256.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/translations/
    - assets/img/
    - CHANGELOG.md
